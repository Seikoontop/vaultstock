<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GéoQuiz UE — 27 Pays &amp; Capitales</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body[data-theme="dark"]{
  --bg:#080f1e;--surface:#0f1829;--surface2:#162035;--surface3:#1d2a45;
  --ocean:#05101f;--graticule:rgba(255,255,255,.04);
  --eu:#1e3f7a;--eu-s:#2d5aa8;
  --other:#0e1928;--other-s:#111d32;
  --active:#f59e0b;--active-s:#fbbf24;--active-glow:rgba(245,158,11,.7);
  --correct:#10b981;--correct-s:#34d399;--correct-glow:rgba(16,185,129,.5);
  --failed:#ef4444;--failed-s:#f87171;
  --text:#dde6f5;--dim:#5c7aa3;--accent:#3b82f6;--yellow:#f5c518;--r:10px;
  --hb:rgba(59,130,246,.18);--cb:rgba(255,255,255,.05);
  --ibg:#1d2a45;--ib:rgba(59,130,246,.25);
}
body[data-theme="blue"]{
  --bg:#071626;--surface:#0a1f3a;--surface2:#0d2648;--surface3:#112f57;
  --ocean:#04111e;--graticule:rgba(100,200,255,.07);
  --eu:#1a4a8a;--eu-s:#2060b0;
  --other:#08192e;--other-s:#0a1f3a;
  --active:#f59e0b;--active-s:#fbbf24;--active-glow:rgba(245,158,11,.75);
  --correct:#10b981;--correct-s:#34d399;--correct-glow:rgba(16,185,129,.5);
  --failed:#ef4444;--failed-s:#f87171;
  --text:#b8d4f0;--dim:#3d6a96;--accent:#3d8ef0;--yellow:#fcd34d;--r:10px;
  --hb:rgba(61,142,240,.2);--cb:rgba(100,170,255,.08);
  --ibg:#112f57;--ib:rgba(61,142,240,.3);
}
body[data-theme="light"]{
  --bg:#eef2f8;--surface:#fff;--surface2:#f5f8fc;--surface3:#e3eaf4;
  --ocean:#b8d4ea;--graticule:rgba(0,50,130,.06);
  --eu:#3b7dd8;--eu-s:#2060b8;
  --other:#d0dcea;--other-s:#b8cade;
  --active:#d97706;--active-s:#f59e0b;--active-glow:rgba(217,119,6,.5);
  --correct:#059669;--correct-s:#10b981;--correct-glow:rgba(5,150,105,.4);
  --failed:#dc2626;--failed-s:#ef4444;
  --text:#1a2a3a;--dim:#4a6a8a;--accent:#2563eb;--yellow:#92400e;--r:10px;
  --hb:rgba(37,99,235,.12);--cb:rgba(0,50,130,.07);
  --ibg:#eef2f8;--ib:rgba(37,99,235,.2);
}

body{background:var(--bg);color:var(--text);font-family:'Lexend',sans-serif;min-height:100vh;overflow:hidden;transition:background .3s,color .3s}
#app{display:flex;flex-direction:column;height:100vh}

header{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--surface);border-bottom:1px solid var(--hb);flex-shrink:0;gap:10px;transition:background .3s}
.logo{display:flex;align-items:center;gap:8px;font-size:1.05rem;font-weight:800;color:var(--yellow);letter-spacing:-.02em}
.eu-circle{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#003399;font-size:.6rem;color:#ffcc00;flex-shrink:0}
.hright{display:flex;align-items:center;gap:8px}
#mode-tag{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:4px 11px;border-radius:20px;background:rgba(59,130,246,.14);color:#93c5fd;border:1px solid rgba(59,130,246,.28)}
body[data-theme="light"] #mode-tag{color:#1d4ed8;background:rgba(37,99,235,.09);border-color:rgba(37,99,235,.22)}
.tbtn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1px solid var(--cb);background:var(--surface2);cursor:pointer;font-size:1.05rem;transition:all .2s;flex-shrink:0}
.tbtn:hover{background:var(--surface3);transform:scale(1.08)}

main{display:flex;flex:1;overflow:hidden}
#map-wrap{flex:1;position:relative;background:var(--ocean);overflow:hidden;cursor:grab;transition:background .3s}
#map-wrap.pan{cursor:grabbing}
#map{width:100%;height:100%}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--dim);font-size:.9rem;z-index:20;background:var(--ocean)}
.spin{width:36px;height:36px;border:3px solid rgba(59,130,246,.2);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MAP ELEMENTS ── */
.ceu{fill:var(--eu);stroke:var(--eu-s);stroke-width:.6;transition:fill .3s,stroke .3s}
.cother{fill:var(--other);stroke:var(--other-s);stroke-width:.3}

/* Country states via class on path */
.ceu.st-active{fill:var(--active);stroke:var(--active-s)}
.ceu.st-correct{fill:var(--correct);stroke:var(--correct-s)}
.ceu.st-failed{fill:var(--failed);stroke:var(--failed-s)}

/* Pulse rings — drawn in SVG, controlled via JS */
.pulse-outer{fill:none;stroke:var(--active-s);stroke-width:2;animation:pulse-out 1.6s ease-out infinite;pointer-events:none}
.pulse-inner{fill:var(--active);stroke:#fff;stroke-width:1.5;animation:pulse-in 1.6s ease-in-out infinite;pointer-events:none}
@keyframes pulse-out{0%{r:8;opacity:.8}100%{r:28;opacity:0}}
@keyframes pulse-in{0%,100%{r:7}50%{r:10}}

/* Capital dots */
.cap-ring{fill:none;stroke:var(--active-s);stroke-width:2;animation:pulse-out 1.8s ease-out infinite;pointer-events:none}
.cap-dot{fill:var(--active);stroke:#fff;stroke-width:1.5;pointer-events:none}

/* Map controls */
.mctrls{position:absolute;bottom:14px;left:14px;display:flex;flex-direction:column;gap:5px;z-index:10}
.mc{width:32px;height:32px;border-radius:7px;border:1px solid var(--cb);background:var(--surface);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-weight:700}
.mc:hover{background:var(--surface3)}
.hint{position:absolute;bottom:14px;right:14px;background:var(--surface);border:1px solid var(--cb);border-radius:7px;padding:5px 10px;font-size:.62rem;color:var(--dim);z-index:10;pointer-events:none;opacity:.75}

/* PANEL */
#panel{width:308px;min-width:265px;background:var(--surface);border-left:1px solid var(--hb);display:flex;flex-direction:column;overflow-y:auto;gap:10px;padding:12px;transition:background .3s}
.card{background:var(--surface2);border-radius:var(--r);padding:11px;border:1px solid var(--cb);transition:background .3s}
.lbl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:5px}
.pw{background:var(--surface3);border-radius:999px;height:7px;overflow:hidden;margin-bottom:4px}
.pb{height:100%;background:var(--correct);border-radius:999px;transition:width .5s ease}
.pt{font-size:.68rem;color:var(--dim);text-align:right}
.sc2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.sc{background:var(--surface3);border-radius:8px;padding:8px;text-align:center}
.sc .v{font-size:1.45rem;font-weight:800;line-height:1}
.sc .l{font-size:.57rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-top:3px}
.sc.ok .v{color:var(--correct)}.sc.ko .v{color:var(--failed)}
.ql{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:6px}
.qt{font-size:.92rem;font-weight:500;line-height:1.4}
.tries{display:flex;gap:5px;margin-top:9px}
.td{width:9px;height:9px;border-radius:50%;background:var(--dim);transition:background .25s}
.td.ok{background:var(--accent)}.td.ko{background:var(--failed)}
.ir{display:flex;gap:7px}
#inp{flex:1;background:var(--ibg);border:1.5px solid var(--ib);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Lexend',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s,background .2s}
#inp:focus{border-color:var(--accent)}
#inp.ok{border-color:var(--correct);background:rgba(16,185,129,.11)}
#inp.ko{border-color:var(--failed);background:rgba(239,68,68,.1)}
#btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-family:'Lexend',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:background .2s,transform .1s}
#btn:hover{background:#2563eb}#btn:active{transform:scale(.96)}#btn:disabled{opacity:.4;cursor:default}
#fb{border-radius:8px;padding:8px 12px;font-size:.79rem;font-weight:500;display:none;animation:fbin .2s ease}
@keyframes fbin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
#fb.ok{background:rgba(16,185,129,.14);color:var(--correct);border:1px solid rgba(16,185,129,.3)}
#fb.ko{background:rgba(239,68,68,.12);color:var(--failed);border:1px solid rgba(239,68,68,.28)}
.pban{background:linear-gradient(135deg,var(--surface3),var(--surface2));border-radius:var(--r);padding:11px 13px;border:1px solid var(--cb);text-align:center}
.pban h2{font-size:.88rem;font-weight:700;margin-bottom:3px}
.pban p{font-size:.69rem;color:var(--dim);line-height:1.4}
.btn{width:100%;padding:9px;border:none;border-radius:8px;font-family:'Lexend',sans-serif;font-weight:600;font-size:.84rem;cursor:pointer;transition:all .2s}
.bp{background:var(--accent);color:#fff}.bp:hover{background:#2563eb}
.bs{background:var(--surface3);color:var(--dim);border:1px solid var(--cb)}.bs:hover{color:var(--text)}
.bg{background:rgba(16,185,129,.16);color:var(--correct);border:1px solid rgba(16,185,129,.3)}.bg:hover{background:rgba(16,185,129,.26)}
.ts{text-align:center;padding:6px}
.ts .ico{font-size:2.5rem;margin-bottom:9px}
.ts h2{font-size:1rem;font-weight:700;margin-bottom:5px}
.ts p{font-size:.77rem;color:var(--dim);margin-bottom:13px;line-height:1.5}
.fs{text-align:center;padding:6px}
.fs .tr{font-size:2.8rem;margin-bottom:9px}
.fs h2{font-size:1.1rem;font-weight:800;margin-bottom:5px}
.fs p{font-size:.77rem;color:var(--dim);margin-bottom:13px}
.fsc{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}

@media(max-width:720px){
  body,#app{overflow:auto;height:auto}
  main{flex-direction:column}
  #map-wrap{height:56vw;min-height:230px;flex:none}
  #panel{width:100%;flex:none;border-left:none;border-top:1px solid var(--hb)}
}
</style>
</head>
<body data-theme="dark">
<div id="app">
  <header>
    <div class="logo"><div class="eu-circle">★★★</div>GéoQuiz UE</div>
    <div class="hright">
      <span id="mode-tag">Chargement…</span>
      <button class="tbtn" id="tbtn" title="Thème">🌙</button>
    </div>
  </header>
  <main>
    <div id="map-wrap">
      <div id="loading"><div class="spin"></div>Chargement de la carte…</div>
      <svg id="map"></svg>
      <div class="mctrls">
        <button class="mc" id="z-in">+</button>
        <button class="mc" id="z-out">−</button>
        <button class="mc" id="z-rst" style="font-size:.8rem">⌂</button>
      </div>
      <div class="hint">🖱 Molette · Glisser pour naviguer</div>
    </div>
    <div id="panel"></div>
  </main>
</div>
<script>
/* ════════════════════ DATA ════════════════════ */
const EU = [
  {id:40,  name:"Autriche",   cap:"Vienne",      coord:[16.37,48.21], altN:[],                                         altC:["wien","vienna"]},
  {id:56,  name:"Belgique",   cap:"Bruxelles",   coord:[4.35,50.85],  altN:[],                                         altC:["brussels","brussel","bruxelle"]},
  {id:100, name:"Bulgarie",   cap:"Sofia",        coord:[23.32,42.70], altN:[],                                         altC:[]},
  {id:191, name:"Croatie",    cap:"Zagreb",       coord:[16.00,45.81], altN:[],                                         altC:[]},
  {id:196, name:"Chypre",     cap:"Nicosie",      coord:[33.37,35.17], altN:[],                                         altC:["nicosia","lefkosia"]},
  {id:203, name:"Tchéquie",   cap:"Prague",       coord:[15.47,49.82], altN:["republique tcheque","tcheque","tchequie"], altC:["praha"]},
  {id:208, name:"Danemark",   cap:"Copenhague",   coord:[10.40,55.68], altN:[],                                         altC:["kobenhavn","copenhagen","koebenhavn"]},
  {id:233, name:"Estonie",    cap:"Tallinn",      coord:[25.01,58.60], altN:[],                                         altC:[]},
  {id:246, name:"Finlande",   cap:"Helsinki",     coord:[25.75,61.00], altN:[],                                         altC:["helsingfors"]},
  {id:250, name:"France",     cap:"Paris",        coord:[2.35,46.23],  altN:[],                                         altC:[]},
  {id:276, name:"Allemagne",  cap:"Berlin",       coord:[10.45,51.17], altN:[],                                         altC:[]},
  {id:300, name:"Grèce",      cap:"Athènes",      coord:[22.00,39.07], altN:["grece","hellas"],                         altC:["athenes","athens","athinai"]},
  {id:348, name:"Hongrie",    cap:"Budapest",     coord:[19.50,47.16], altN:[],                                         altC:[]},
  {id:372, name:"Irlande",    cap:"Dublin",       coord:[-8.25,53.41], altN:[],                                         altC:[]},
  {id:380, name:"Italie",     cap:"Rome",         coord:[12.57,41.87], altN:[],                                         altC:["roma"]},
  {id:428, name:"Lettonie",   cap:"Riga",         coord:[24.60,56.88], altN:[],                                         altC:[]},
  {id:440, name:"Lituanie",   cap:"Vilnius",      coord:[23.88,55.17], altN:[],                                         altC:[]},
  {id:442, name:"Luxembourg", cap:"Luxembourg",   coord:[6.13,49.61],  altN:[],                                         altC:["luxemburg","luxembourg ville"]},
  {id:470, name:"Malte",      cap:"La Valette",   coord:[14.51,35.90], altN:[],                                         altC:["valletta","valette","la valette"]},
  {id:528, name:"Pays-Bas",   cap:"Amsterdam",    coord:[5.29,52.13],  altN:["pays bas","hollande","nederland","netherlands"],altC:[]},
  {id:616, name:"Pologne",    cap:"Varsovie",     coord:[21.00,52.23], altN:[],                                         altC:["warsaw","warszawa"]},
  {id:620, name:"Portugal",   cap:"Lisbonne",     coord:[-9.14,38.72], altN:[],                                         altC:["lisbon","lisboa"]},
  {id:642, name:"Roumanie",   cap:"Bucarest",     coord:[26.10,44.44], altN:[],                                         altC:["bucharest","bucuresti"]},
  {id:703, name:"Slovaquie",  cap:"Bratislava",   coord:[17.11,48.15], altN:[],                                         altC:[]},
  {id:705, name:"Slovénie",   cap:"Ljubljana",    coord:[14.82,46.12], altN:["slovenie"],                               altC:[]},
  {id:724, name:"Espagne",    cap:"Madrid",       coord:[-3.69,40.42], altN:[],                                         altC:[]},
  {id:752, name:"Suède",      cap:"Stockholm",    coord:[18.07,59.33], altN:["suede"],                                  altC:[]}
];
const EU_IDS = new Set(EU.map(c=>c.id));
const EU_MAP  = new Map(EU.map(c=>[c.id,c]));

/* ════════════════════ THEMES ════════════════════ */
const THEMES=['dark','blue','light'], TICONS={dark:'🌙',blue:'🌊',light:'☀️'};
let themeIdx=0;
try{ const t=+localStorage.getItem('gq_theme'); if(t>=0&&t<3){themeIdx=t;document.body.dataset.theme=THEMES[t];} }catch(e){}
document.getElementById('tbtn').textContent=TICONS[THEMES[themeIdx]];
document.getElementById('tbtn').addEventListener('click',()=>{
  themeIdx=(themeIdx+1)%3;
  document.body.dataset.theme=THEMES[themeIdx];
  document.getElementById('tbtn').textContent=TICONS[THEMES[themeIdx]];
  try{localStorage.setItem('gq_theme',themeIdx);}catch(e){}
});

/* ════════════════════ STATE ════════════════════ */
const SKEY='geoquiz_v5';
let S=freshState();
function freshState(){return{screen:'countries_quiz',queue:[],retryQ:[],current:null,attempts:0,results:{},capRes:{},cok:0,kpok:0,phase:'main'};}
function saveS(){try{localStorage.setItem(SKEY,JSON.stringify(S));}catch(e){}}
function loadS(){try{const d=localStorage.getItem(SKEY);if(d){const p=JSON.parse(d);if(p.screen)S=p;}}catch(e){}}
function resetS(){S=freshState();try{localStorage.removeItem(SKEY);}catch(e){}}

/* ════════════════════ UTILS ════════════════════ */
function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[-'']/g,' ').trim().replace(/\s+/g,' ');}
function chk(input,c,mode){
  const v=norm(input);
  return mode==='countries'?[norm(c.name),...c.altN.map(norm)].includes(v):[norm(c.cap),...c.altC.map(norm)].includes(v);
}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

/* ════════════════════ MAP ════════════════════ */
let svg,proj,pathFn,gBase,gEU,gMarkers,gPulse,gDots,zoomB,mapReady=false;
let curK=1,curTr=d3.zoomIdentity;
const EU_BBOX={type:'Feature',geometry:{type:'Polygon',coordinates:[[[-12,33],[44,33],[44,71.5],[-12,71.5],[-12,33]]]}};

/*
  clipToEurope: for MultiPolygon, keep only sub-polygons whose centroid
  is within European bounds. NEVER returns null — keeps at least one polygon.
  For simple Polygon, always keep it (small islands are fine if within bounds).
*/
function clipToEurope(feat){
  if(!feat||!feat.geometry) return feat;
  const g=feat.geometry;
  if(g.type==='MultiPolygon'){
    const scored=g.coordinates.map(poly=>{
      const ring=poly[0];
      const lons=ring.map(p=>p[0]),lats=ring.map(p=>p[1]);
      const cx=(Math.min(...lons)+Math.max(...lons))/2;
      const cy=(Math.min(...lats)+Math.max(...lats))/2;
      const area=(Math.max(...lons)-Math.min(...lons))*(Math.max(...lats)-Math.min(...lats));
      const inEU=cx>=-14&&cx<=45&&cy>=32&&cy<=73;
      return {poly,inEU,area};
    });
    const euOnly=scored.filter(x=>x.inEU);
    // Keep EU polygons; if none found (shouldn't happen), keep largest overall
    const kept=euOnly.length>0?euOnly:scored.sort((a,b)=>b.area-a.area).slice(0,1);
    return {...feat,geometry:{...g,coordinates:kept.map(x=>x.poly)}};
  }
  return feat; // Polygon — always keep as-is
}

function initMap(world){
  document.getElementById('loading').style.display='none';
  const wrap=document.getElementById('map-wrap');
  let W=wrap.clientWidth,H=wrap.clientHeight;
  svg=d3.select('#map').attr('width',W).attr('height',H);

  const all=topojson.feature(world,world.objects.countries);
  const euF=all.features.filter(f=>EU_IDS.has(+f.id));
  const otF=all.features.filter(f=>!EU_IDS.has(+f.id));

  proj=d3.geoMercator().fitExtent([[10,10],[W-10,H-10]],EU_BBOX);
  pathFn=d3.geoPath().projection(proj);

  gBase=svg.append('g');
  // Ocean bg
  gBase.append('rect').attr('x',-9e3).attr('y',-9e3).attr('width',3e4).attr('height',3e4).attr('fill','var(--ocean)');
  // Graticule
  gBase.append('path').datum(d3.geoGraticule()()).attr('fill','none').attr('stroke','var(--graticule)').attr('stroke-width',.5).attr('d',pathFn);
  // Non-EU
  gBase.append('g').selectAll('path').data(otF).enter().append('path').attr('class','cother')
    .attr('d',d=>{try{return pathFn(clipToEurope(d));}catch(e){return null;}});
  // EU paths
  gEU=gBase.append('g');
  gEU.selectAll('path').data(euF).enter().append('path').attr('class','ceu').attr('id',d=>'cp'+d.id)
    .attr('d',d=>{try{return pathFn(clipToEurope(d));}catch(e){return pathFn(d);}});

  /*
    ── MARKER SYSTEM ──
    For EVERY EU country we add a circle marker at its geographic centroid.
    These markers guarantee visibility even for tiny countries (Malta, Luxembourg, Cyprus)
    whose SVG path is ≤2px at default zoom.
    - Default: invisible (r=0)
    - Active:  large pulsing ring + filled dot (always visible)
    - Correct: small green dot (confirmation)
    - Failed:  small red dot
  */
  gMarkers=gBase.append('g'); // filled indicator dots
  gPulse=gBase.append('g');   // animated pulse rings (only for active)
  EU.forEach(c=>{
    const [x,y]=proj(c.coord);
    // Invisible base dot — becomes visible when state changes
    gMarkers.append('circle').attr('id','mk'+c.id).attr('cx',x).attr('cy',y).attr('r',0)
      .attr('fill','transparent').attr('stroke','none').attr('pointer-events','none');
  });

  gDots=gBase.append('g'); // capital dots (mode capitales)

  /* ── ZOOM / PAN ── */
  zoomB=d3.zoom().scaleExtent([0.85,14])
    .on('start',()=>document.getElementById('map-wrap').classList.add('pan'))
    .on('zoom',e=>{
      curTr=e.transform; curK=e.transform.k;
      gBase.attr('transform',e.transform);
      // Scale stroke-width with zoom
      const k=curK;
      gEU.selectAll('path').style('stroke-width',0.6/k);
      // Active country gets thicker stroke regardless
      const act=gEU.select('.st-active');
      if(!act.empty()) act.style('stroke-width',2/k);
    })
    .on('end',()=>document.getElementById('map-wrap').classList.remove('pan'));
  svg.call(zoomB);

  document.getElementById('z-in').addEventListener('click',()=>svg.transition().duration(350).call(zoomB.scaleBy,1.7));
  document.getElementById('z-out').addEventListener('click',()=>svg.transition().duration(350).call(zoomB.scaleBy,1/1.7));
  document.getElementById('z-rst').addEventListener('click',()=>svg.transition().duration(500).call(zoomB.transform,d3.zoomIdentity));

  // Responsive resize
  const ro=new ResizeObserver(()=>{
    W=wrap.clientWidth;H=wrap.clientHeight;
    svg.attr('width',W).attr('height',H);
    proj.fitExtent([[10,10],[W-10,H-10]],EU_BBOX);
    pathFn=d3.geoPath().projection(proj);
    gBase.selectAll('path').attr('d',d=>{try{return pathFn(clipToEurope(d));}catch(e){try{return pathFn(d);}catch(e2){return null;}}});
    // Update marker positions
    EU.forEach(c=>{
      const [x,y]=proj(c.coord);
      d3.select('#mk'+c.id).attr('cx',x).attr('cy',y);
    });
    refreshDot();
  });
  ro.observe(wrap);

  mapReady=true;
  colorMap();
}

/*
  setState: unified function to set visual state for a country.
  state: '' | 'active' | 'correct' | 'failed'
*/
function setCountryState(id, state){
  const path=document.getElementById('cp'+id);
  const mk=document.getElementById('mk'+id);
  if(path){
    path.className.baseVal='ceu'+(state?' st-'+state:'');
    path.style.strokeWidth=(state==='active'?2:0.6)/curK;
  }
  if(mk){
    if(state==='active'){
      // Pulsing marker — big and very visible
      mk.setAttribute('r',8);
      mk.setAttribute('fill','var(--active)');
      mk.setAttribute('stroke','#fff');
      mk.setAttribute('stroke-width',2);
      // Add pulse ring in gPulse
      const cx=+mk.getAttribute('cx'), cy=+mk.getAttribute('cy');
      const existing=document.getElementById('pu'+id);
      if(existing) existing.remove();
      const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
      ring.setAttribute('id','pu'+id);
      ring.setAttribute('cx',cx);ring.setAttribute('cy',cy);ring.setAttribute('r',8);
      ring.setAttribute('class','pulse-outer');
      gPulse.node().appendChild(ring);
      const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('id','pd'+id);
      dot.setAttribute('cx',cx);dot.setAttribute('cy',cy);dot.setAttribute('r',8);
      dot.setAttribute('class','pulse-inner');
      gPulse.node().appendChild(dot);
    } else {
      // Remove pulse rings
      const pu=document.getElementById('pu'+id);if(pu)pu.remove();
      const pd=document.getElementById('pd'+id);if(pd)pd.remove();
      if(state==='correct'){
        mk.setAttribute('r',5);mk.setAttribute('fill','var(--correct)');
        mk.setAttribute('stroke','#fff');mk.setAttribute('stroke-width',1.5);
      } else if(state==='failed'){
        mk.setAttribute('r',5);mk.setAttribute('fill','var(--failed)');
        mk.setAttribute('stroke','#fff');mk.setAttribute('stroke-width',1.5);
      } else {
        mk.setAttribute('r',0);mk.setAttribute('fill','transparent');
        mk.setAttribute('stroke','none');
      }
    }
  }
}

function colorMap(){
  if(!mapReady) return;
  const isCap=S.screen==='capitals_quiz'||S.screen==='done';
  EU.forEach(c=>{
    const isA=S.current&&S.current.id===c.id;
    const res=isCap?S.capRes[c.id]:S.results[c.id];
    const state=isA&&res!=='correct'?'active':res==='correct'?'correct':res==='failed'?'failed':'';
    setCountryState(c.id,state);
  });
}

function showCapDot(country){
  gDots.selectAll('*').remove();
  if(!country) return;
  const [x,y]=proj(country.coord);
  gDots.append('circle').attr('class','cap-ring').attr('cx',x).attr('cy',y).attr('r',7);
  gDots.append('circle').attr('class','cap-dot').attr('cx',x).attr('cy',y).attr('r',7);
  panTo(country);
}
function hideCapDot(){if(gDots)gDots.selectAll('*').remove();}
function refreshDot(){if(S.screen==='capitals_quiz'&&S.current)showCapDot(S.current);}

function panTo(country){
  const wrap=document.getElementById('map-wrap');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  const [px,py]=proj(country.coord);
  const k=curK,tx=curTr.x||0,ty=curTr.y||0;
  const sx=px*k+tx,sy=py*k+ty,mg=80;
  if(sx<mg||sx>W-mg||sy<mg||sy>H-mg){
    svg.transition().duration(600).call(zoomB.transform,
      d3.zoomIdentity.translate(W/2-px*k,H/2-py*k).scale(k));
  }
}

/* ════════════════════ QUIZ ENGINE ════════════════════ */
function startCountries(){
  S.screen='countries_quiz';S.phase='main';
  S.queue=shuffle(EU.map(c=>c.id));
  S.retryQ=[];S.results={};S.cok=0;S.current=null;
  hideCapDot();colorMap();nextQ();
}
function startCapitals(){
  S.screen='capitals_quiz';S.phase='main';
  S.queue=shuffle(EU.map(c=>c.id));
  S.retryQ=[];S.capRes={};S.kpok=0;S.current=null;
  colorMap();hideCapDot();nextQ();
}

function nextQ(){
  if(S.queue.length===0){
    if(S.retryQ.length>0){
      S.phase='retry';
      const nq=shuffle([...S.retryQ]);S.retryQ=[];
      nq.forEach(id=>{
        if(S.screen==='countries_quiz')S.results[id]='pending';
        else S.capRes[id]='pending';
      });
      S.queue=nq;
    } else {modeComplete();return;}
  }
  const id=S.queue.shift();
  if(!EU_MAP.has(id)){nextQ();return;}
  S.current=EU_MAP.get(id);S.attempts=0;
  if(S.screen==='countries_quiz')S.results[id]='pending';
  else S.capRes[id]='pending';
  colorMap();
  if(S.screen==='capitals_quiz')showCapDot(S.current);
  else{hideCapDot();panTo(S.current);}
  renderPanel();saveS();
  setTimeout(()=>{const i=document.getElementById('inp');if(i){i.disabled=false;i.value='';i.className='';i.focus();}},60);
}

function modeComplete(){
  S.current=null;hideCapDot();colorMap();
  S.screen=S.screen==='countries_quiz'?'countries_done':'done';
  renderPanel();saveS();
}

function submit(){
  const inp=document.getElementById('inp');
  if(!inp||!S.current||inp.disabled)return;
  const val=inp.value.trim();if(!val)return;
  const mode=S.screen==='countries_quiz'?'countries':'capitals';
  if(chk(val,S.current,mode)){
    if(mode==='countries'){S.results[S.current.id]='correct';S.cok++;}
    else{S.capRes[S.current.id]='correct';S.kpok++;}
    colorMap();
    inp.value='';inp.className='ok';
    showFB('ok',`✓ Correct ! « ${mode==='countries'?S.current.name:S.current.cap} » 🎉`);
    disInp(true);
    setTimeout(()=>{inp.className='';disInp(false);nextQ();},1200);
  } else {
    S.attempts++;inp.value='';inp.className='ko';
    setTimeout(()=>inp.className='',500);
    if(S.attempts>=3){
      const ans=mode==='countries'?S.current.name:S.current.cap;
      if(mode==='countries'){S.results[S.current.id]='failed';S.retryQ.push(S.current.id);}
      else{S.capRes[S.current.id]='failed';S.retryQ.push(S.current.id);}
      colorMap();
      showFB('ko',`✗ Réponse attendue : <strong>${ans}</strong>`);
      disInp(true);
      setTimeout(()=>{disInp(false);nextQ();},2000);
    } else {
      const r=3-S.attempts;
      showFB('ko',`✗ Incorrect — ${r} tentative${r>1?'s':''} restante${r>1?'s':''}`);
      updDots();
    }
  }
}
function disInp(d){const i=document.getElementById('inp');if(i)i.disabled=d;const b=document.getElementById('btn');if(b)b.disabled=d;}
function showFB(t,h){const f=document.getElementById('fb');if(!f)return;f.className=t;f.innerHTML=h;f.style.display='block';}
function updDots(){const c=document.getElementById('tries');if(!c)return;c.innerHTML=Array.from({length:3},(_,i)=>`<div class="td ${i<S.attempts?'ko':'ok'}"></div>`).join('');}

/* ════════════════════ RENDER ════════════════════ */
function renderPanel(){
  const panel=document.getElementById('panel'),tag=document.getElementById('mode-tag');
  if(S.screen==='countries_quiz'){tag.textContent='🗺️ Mode Pays';renderQ(panel,'countries');}
  else if(S.screen==='countries_done'){tag.textContent='✅ Pays terminés';renderCDone(panel);}
  else if(S.screen==='capitals_quiz'){tag.textContent='🏛️ Mode Capitales';renderQ(panel,'capitals');}
  else if(S.screen==='done'){tag.textContent='🏆 Terminé !';renderFin(panel);}
}
function renderQ(panel,mode){
  const isC=mode==='countries',cnt=isC?S.cok:S.kpok;
  const failed=Object.values(isC?S.results:S.capRes).filter(v=>v==='failed').length+S.retryQ.length;
  const pct=Math.round(cnt/27*100);
  const ph=S.phase==='retry'?'🔄 Reprise des erreurs':isC?'🌍 Identifier les pays':'🏛️ Retrouver les capitales';
  panel.innerHTML=`
<div class="pban"><h2>${ph}</h2><p>${isC?'Le pays surligné en jaune → son nom ?':'Le point jaune → quelle capitale ?'}</p></div>
<div class="card">
  <div class="lbl">Progression — ${cnt}/27</div>
  <div class="pw"><div class="pb" style="width:${pct}%"></div></div>
  <div class="pt">${pct}% · ${cnt} ✓ · ${failed} ✗</div>
</div>
<div class="sc2">
  <div class="sc ok"><div class="v">${cnt}</div><div class="l">Corrects</div></div>
  <div class="sc ko"><div class="v">${failed}</div><div class="l">À revoir</div></div>
</div>
<div class="card">
  <div class="ql">Question</div>
  <div class="qt">${isC?'Quel est le nom de ce pays ?':'Quelle est la capitale de ce pays ?'}</div>
  <div class="tries" id="tries">${Array.from({length:3},(_,i)=>`<div class="td ${i<S.attempts?'ko':'ok'}"></div>`).join('')}</div>
</div>
<div class="ir">
  <input id="inp" type="text" placeholder="Votre réponse…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <button id="btn">↵</button>
</div>
<div id="fb"></div>
<div style="margin-top:auto">
  <button class="btn bs" onclick="confirmReset()">↺ Recommencer depuis le début</button>
</div>`;
  document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
  document.getElementById('btn').addEventListener('click',submit);
}
function renderCDone(panel){
  panel.innerHTML=`
<div class="ts"><div class="ico">🎉</div><h2>Les 27 pays terminés !</h2>
<p><strong style="color:var(--correct)">${S.cok}/27</strong> pays trouvés correctement.${S.cok===27?' 🌟 Score parfait !':''}</p></div>
<div class="sc2" style="margin-bottom:9px">
  <div class="sc ok"><div class="v">${S.cok}</div><div class="l">Corrects</div></div>
  <div class="sc ko"><div class="v">${27-S.cok}</div><div class="l">Avec aide</div></div>
</div>
<button class="btn bg" onclick="startCapitals()" style="margin-bottom:7px">🏛️ Mode Capitales →</button>
<button class="btn bs" onclick="startCountries()">↺ Rejouer les pays</button>`;
}
function renderFin(panel){
  const tot=S.cok+S.kpok;
  panel.innerHTML=`
<div class="fs"><div class="tr">🏆</div><h2>Quiz complété !</h2><p>Les 27 pays <em>et</em> leurs capitales — bravo !</p></div>
<div class="fsc">
  <div class="sc ok"><div class="v">${S.cok}</div><div class="l">Pays</div></div>
  <div class="sc ok"><div class="v">${S.kpok}</div><div class="l">Capitales</div></div>
</div>
<div class="card" style="text-align:center;margin-bottom:11px">
  <div class="lbl">Score global</div>
  <div style="font-size:2.1rem;font-weight:800;color:var(--yellow)">${tot}<span style="font-size:1rem;font-weight:400;color:var(--dim)">/54</span></div>
</div>
<button class="btn bp" onclick="fullRestart()" style="margin-bottom:7px">🔄 Tout recommencer</button>
<button class="btn bs" onclick="startCapitals()">↺ Rejouer les capitales</button>`;
}
function confirmReset(){if(confirm('Recommencer ? La progression sera effacée.'))fullRestart();}
function fullRestart(){resetS();renderPanel();setTimeout(startCountries,50);}

/* ════════════════════ INIT ════════════════════ */
(function init(){
  loadS();
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(world=>{
    initMap(world);
    if(S.screen&&S.screen!=='loading'){
      colorMap();
      if(S.screen==='capitals_quiz'&&S.current)showCapDot(S.current);
      else if(S.current)panTo(S.current);
      renderPanel();
    } else {
      startCountries();
    }
  }).catch(()=>{
    document.getElementById('loading').innerHTML=`<div style="color:var(--failed);text-align:center;padding:20px"><div style="font-size:2rem;margin-bottom:8px">⚠️</div><div>Impossible de charger la carte.</div><div style="font-size:.75rem;color:var(--dim);margin-top:5px">Vérifiez votre connexion.</div></div>`;
  });
})();
</script>
</body>
